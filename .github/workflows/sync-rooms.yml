name: Sync rooms to Supabase

on:
  push:
    branches: [main]
    paths:
      - 'public/registry/**/config.json'

jobs:
  # On merge to main: update changed rooms in prod
  sync-on-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync registry to prod
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const fs = require('fs');

          // Update all top-level registry folders that have a config.json
          const registryDir = 'public/registry';
          const folders = fs.readdirSync(registryDir).filter(f => {
            if (f === '_template') return false;
            return fs.existsSync(`${registryDir}/${f}/config.json`);
          });

          async function syncRoom(folder) {
            const config = JSON.parse(fs.readFileSync(`${registryDir}/${folder}/config.json`, 'utf8'));
            const name = config.room_display_name;
            if (!name) return;

            const res = await fetch(
              `${process.env.SUPABASE_URL}/rest/v1/rooms?registry_id=eq.${encodeURIComponent(folder)}`,
              {
                method: 'PATCH',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                  'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                  'Prefer': 'return=representation',
                },
                body: JSON.stringify({ name, status: 'active' }),
              }
            );

            const data = await res.json();
            if (!res.ok) { console.error(`Failed: ${folder}`, data); process.exit(1); }
            if (!data.length) console.warn(`No row found for registry_id="${folder}"`);
            else console.log(`✓ ${folder} → "${name}", status: active`);
          }

          // Reconcile: mark deleted any rooms whose config.json was removed in this merge commit
          async function reconcile() {
            const { execSync } = require('child_process');
            const deleted = execSync(
              "git diff HEAD~1 HEAD --diff-filter=D --name-only -- 'public/registry/*/config.json'"
            ).toString().trim().split('\n')
              .filter(Boolean)
              .map(p => p.replace('public/registry/', '').replace('/config.json', ''));

            if (!deleted.length) { console.log('Nothing to mark deleted.'); return; }

            await Promise.all(deleted.map(async id => {
              const patch = await fetch(
                `${process.env.SUPABASE_URL}/rest/v1/rooms?registry_id=eq.${encodeURIComponent(id)}`,
                {
                  method: 'PATCH',
                  headers: {
                    'Content-Type': 'application/json',
                    'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                    'Prefer': 'return=representation',
                  },
                  body: JSON.stringify({ status: 'deleted', grid_x: null, grid_y: null }),
                }
              );
              if (!patch.ok) { console.error(`Failed to mark deleted: ${id}`, await patch.json()); process.exit(1); }
              console.log(`✓ ${id} marked deleted in prod`);
            }));
          }

          Promise.all(folders.map(syncRoom))
            .then(() => reconcile())
            .catch(err => { console.error(err); process.exit(1); });
          EOF

