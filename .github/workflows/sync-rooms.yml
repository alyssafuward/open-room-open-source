name: Sync rooms to Supabase

on:
  # Same-repo PRs: use pull_request so the workflow runs from the PR branch
  pull_request:
    types: [opened, synchronize]
    branches: [main]
  # Fork PRs: use pull_request_target so secrets are accessible
  pull_request_target:
    types: [opened, synchronize]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'public/registry/**/config.json'

jobs:
  # On PR: update changed rooms in dev so preview reflects config
  # New reservations are mirrored to dev automatically via the mirror-to-dev Edge Function
  sync-prod-to-dev:
    # Run on pull_request (same-repo) OR pull_request_target (fork)
    # For pull_request_target, skip same-repo PRs to avoid running twice
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Update changed rooms in dev
        env:
          SUPABASE_DEV_URL: ${{ secrets.SUPABASE_DEV_URL }}
          SUPABASE_DEV_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_DEV_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const fs = require('fs');

          // Only sync top-level registry folders (not sub-pages like pages/*)
          const registryDir = 'public/registry';
          const folders = fs.readdirSync(registryDir).filter(f => {
            if (f === '_template') return false;
            return fs.existsSync(`${registryDir}/${f}/config.json`);
          });

          async function syncRoom(folder) {
            const config = JSON.parse(fs.readFileSync(`${registryDir}/${folder}/config.json`, 'utf8'));
            const name = config.room_display_name;
            if (!name) return;

            const res = await fetch(
              `${process.env.SUPABASE_DEV_URL}/rest/v1/rooms?registry_id=eq.${encodeURIComponent(folder)}`,
              {
                method: 'PATCH',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey': process.env.SUPABASE_DEV_SERVICE_ROLE_KEY,
                  'Authorization': `Bearer ${process.env.SUPABASE_DEV_SERVICE_ROLE_KEY}`,
                  'Prefer': 'return=representation',
                },
                body: JSON.stringify({ name, status: 'active' }),
              }
            );

            const data = await res.json();
            if (!res.ok) { console.error(`Failed: ${folder}`, data); process.exit(1); }
            if (!data.length) console.warn(`⚠ ${folder}: no row in dev — was it reserved?`);
            else console.log(`✓ ${folder} → "${name}", status: active`);
          }

          Promise.all(folders.map(syncRoom))
            .catch(err => { console.error(err); process.exit(1); });
          EOF

      - name: Free deleted rooms in dev
        env:
          SUPABASE_DEV_URL: ${{ secrets.SUPABASE_DEV_URL }}
          SUPABASE_DEV_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_DEV_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const fs = require('fs');

          // Reconcile: fetch all rooms from dev DB, delete any whose top-level registry folder is gone
          async function reconcile() {
            const res = await fetch(
              `${process.env.SUPABASE_DEV_URL}/rest/v1/rooms?registry_id=not.is.null&select=registry_id`,
              {
                headers: {
                  'apikey': process.env.SUPABASE_DEV_SERVICE_ROLE_KEY,
                  'Authorization': `Bearer ${process.env.SUPABASE_DEV_SERVICE_ROLE_KEY}`,
                },
              }
            );
            if (!res.ok) { console.error('Failed to fetch rooms', await res.json()); process.exit(1); }
            const rooms = await res.json();

            const toDelete = rooms
              .map(r => r.registry_id)
              .filter(id => !fs.existsSync(`public/registry/${id}/config.json`));

            if (!toDelete.length) { console.log('Nothing to free.'); return; }

            await Promise.all(toDelete.map(async id => {
              const del = await fetch(
                `${process.env.SUPABASE_DEV_URL}/rest/v1/rooms?registry_id=eq.${encodeURIComponent(id)}`,
                {
                  method: 'DELETE',
                  headers: {
                    'apikey': process.env.SUPABASE_DEV_SERVICE_ROLE_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_DEV_SERVICE_ROLE_KEY}`,
                    'Prefer': 'return=representation',
                  },
                }
              );
              if (!del.ok) { console.error(`Failed to delete: ${id}`, await del.json()); process.exit(1); }
              console.log(`✓ ${id} deleted from dev`);
            }));
          }

          reconcile().catch(err => { console.error(err); process.exit(1); });
          EOF

  # On merge to main: update changed rooms in prod, then sync prod → dev
  sync-on-merge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync registry to prod
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const fs = require('fs');

          // Update all top-level registry folders that have a config.json
          const registryDir = 'public/registry';
          const folders = fs.readdirSync(registryDir).filter(f => {
            if (f === '_template') return false;
            return fs.existsSync(`${registryDir}/${f}/config.json`);
          });

          async function syncRoom(folder) {
            const config = JSON.parse(fs.readFileSync(`${registryDir}/${folder}/config.json`, 'utf8'));
            const name = config.room_display_name;
            if (!name) return;

            const res = await fetch(
              `${process.env.SUPABASE_URL}/rest/v1/rooms?registry_id=eq.${encodeURIComponent(folder)}`,
              {
                method: 'PATCH',
                headers: {
                  'Content-Type': 'application/json',
                  'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                  'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                  'Prefer': 'return=representation',
                },
                body: JSON.stringify({ name, status: 'active' }),
              }
            );

            const data = await res.json();
            if (!res.ok) { console.error(`Failed: ${folder}`, data); process.exit(1); }
            if (!data.length) console.warn(`No row found for registry_id="${folder}"`);
            else console.log(`✓ ${folder} → "${name}", status: active`);
          }

          // Reconcile: delete any DB rows whose registry folder no longer exists
          async function reconcile() {
            const res = await fetch(
              `${process.env.SUPABASE_URL}/rest/v1/rooms?registry_id=not.is.null&select=registry_id`,
              {
                headers: {
                  'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                  'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                },
              }
            );
            if (!res.ok) { console.error('Failed to fetch rooms', await res.json()); process.exit(1); }
            const rooms = await res.json();

            const toDelete = rooms
              .map(r => r.registry_id)
              .filter(id => !fs.existsSync(`${registryDir}/${id}/config.json`));

            if (!toDelete.length) { console.log('Nothing to delete.'); return; }

            await Promise.all(toDelete.map(async id => {
              const del = await fetch(
                `${process.env.SUPABASE_URL}/rest/v1/rooms?registry_id=eq.${encodeURIComponent(id)}`,
                {
                  method: 'DELETE',
                  headers: {
                    'apikey': process.env.SUPABASE_SERVICE_ROLE_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_SERVICE_ROLE_KEY}`,
                    'Prefer': 'return=representation',
                  },
                }
              );
              if (!del.ok) { console.error(`Failed to delete: ${id}`, await del.json()); process.exit(1); }
              console.log(`✓ ${id} deleted from prod`);
            }));
          }

          Promise.all(folders.map(syncRoom))
            .then(() => reconcile())
            .catch(err => { console.error(err); process.exit(1); });
          EOF

      - name: Reconcile dev DB against registry
        env:
          SUPABASE_DEV_URL: ${{ secrets.SUPABASE_DEV_URL }}
          SUPABASE_DEV_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_DEV_SERVICE_ROLE_KEY }}
        run: |
          node << 'EOF'
          const fs = require('fs');

          const registryDir = 'public/registry';

          async function reconcileDev() {
            const res = await fetch(
              `${process.env.SUPABASE_DEV_URL}/rest/v1/rooms?registry_id=not.is.null&select=registry_id`,
              {
                headers: {
                  'apikey': process.env.SUPABASE_DEV_SERVICE_ROLE_KEY,
                  'Authorization': `Bearer ${process.env.SUPABASE_DEV_SERVICE_ROLE_KEY}`,
                },
              }
            );
            if (!res.ok) { console.error('Failed to fetch dev rooms', await res.json()); process.exit(1); }
            const rooms = await res.json();

            const toDelete = rooms
              .map(r => r.registry_id)
              .filter(id => !fs.existsSync(`${registryDir}/${id}/config.json`));

            if (!toDelete.length) { console.log('Dev in sync — nothing to delete.'); return; }

            await Promise.all(toDelete.map(async id => {
              const del = await fetch(
                `${process.env.SUPABASE_DEV_URL}/rest/v1/rooms?registry_id=eq.${encodeURIComponent(id)}`,
                {
                  method: 'DELETE',
                  headers: {
                    'apikey': process.env.SUPABASE_DEV_SERVICE_ROLE_KEY,
                    'Authorization': `Bearer ${process.env.SUPABASE_DEV_SERVICE_ROLE_KEY}`,
                    'Prefer': 'return=representation',
                  },
                }
              );
              if (!del.ok) { console.error(`Failed to delete from dev: ${id}`, await del.json()); process.exit(1); }
              console.log(`✓ ${id} deleted from dev`);
            }));
          }

          reconcileDev().catch(err => { console.error(err); process.exit(1); });
          EOF

      # New reservations are mirrored to dev automatically via the mirror-to-dev Edge Function on INSERT
